name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: moonrepo/setup-rust@v1
        with:
          bins: wit-deps-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: taiki-e/install-action@just
      - run: just init
      - run: just build
      - uses: actions/upload-artifact@v7
        with:
          name: component.wasm
          path: target/wasm32-wasip2/release/*.wasm

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: moonrepo/setup-rust@v1
        with:
          bins: wit-deps-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: wit-deps
      - run: cargo clippy -- -D warnings

  e2e:
    name: E2E Test
    needs: build
    runs-on: ubuntu-latest
    services:
      # Local Swagger Petstore v3 — avoids the public petstore3.swagger.io
      # flakiness that hands us HTTP 500s on test runs.
      petstore:
        image: swaggerapi/petstore3:unstable
        ports:
          - 8080:8080
    env:
      PETSTORE_SPEC: http://localhost:8080/api/v3/openapi.json
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: component.wasm
          path: target/wasm32-wasip2/release/
      - uses: taiki-e/install-action@just
      - name: Wait for petstore sidecar
        run: npx wait-on -t 120s ${{ env.PETSTORE_SPEC }}
      - run: just test

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: moonrepo/setup-rust@v1
      - run: cargo fmt -- --check

  publish:
    name: Publish
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [e2e, clippy, fmt]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: component.wasm
          path: target/wasm32-wasip2/release/
      - uses: oras-project/setup-oras@v1
      - uses: taiki-e/install-action@just
      - run: echo ${{ secrets.GITHUB_TOKEN }} | oras login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Publish
        id: publish
        run: just publish
      - name: Attest
        if: steps.publish.outputs.digest != ''
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.publish.outputs.image }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true
